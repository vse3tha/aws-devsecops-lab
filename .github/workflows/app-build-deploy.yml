name: app-build-deploy

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "k8s/**"
      - ".github/workflows/app-build-deploy.yml"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write
  actions: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  MONGO_URI_SSM_PARAMETER: ${{ vars.MONGO_URI_SSM_PARAMETER }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-deploy:
    name: Build Scan Push Deploy
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        run: |
          echo "IMAGE_URI=${{ steps.ecr-login.outputs.registry }}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=${{ steps.ecr-login.outputs.registry }}/${ECR_REPOSITORY}:latest" >> $GITHUB_ENV

      - name: Build container image
        run: |
          docker build \
            -t "$IMAGE_URI" \
            -t "$IMAGE_LATEST" \
            ./app

      - name: Verify wizexercise.txt in image
        run: |
          docker run --rm "$IMAGE_URI" cat /app/wizexercise.txt

      - name: Run Trivy image scan - SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: 0

      - name: Confirm Trivy SARIF exists
        run: |
          pwd
          ls -la
          test -f trivy-image.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image.sarif') != ''
        with:
          sarif_file: trivy-image.sarif

      - name: Push image to Amazon ECR
        run: |
          docker push "$IMAGE_URI"
          docker push "$IMAGE_LATEST"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"

      - name: Get MongoDB URI from SSM
        run: |
          MONGO_URI=$(aws ssm get-parameter \
            --region "$AWS_REGION" \
            --name "$MONGO_URI_SSM_PARAMETER" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)

          echo "::add-mask::$MONGO_URI"
          echo "MONGO_URI=$MONGO_URI" >> $GITHUB_ENV

      - name: Create or update Kubernetes MongoDB secret
        run: |
          kubectl create namespace wiz-lab --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n wiz-lab create secret generic mongo-secret \
            --from-literal=MONGO_URI="$MONGO_URI" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Install or update NGINX Ingress Controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --set controller.service.type=LoadBalancer

      - name: Deploy Kubernetes manifests
        run: |
          sed "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" k8s/deployment.yaml | kubectl apply -f -

          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/rbac-cluster-admin.yaml

      - name: Wait for application rollout
        run: |
          kubectl -n wiz-lab rollout status deployment/wiz-todo --timeout=300s

      - name: Show application resources
        run: |
          kubectl -n wiz-lab get pods -o wide
          kubectl -n wiz-lab get deploy,svc,ingress
          kubectl -n ingress-nginx get svc

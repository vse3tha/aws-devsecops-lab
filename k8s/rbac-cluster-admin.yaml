apiVersion: v1
kind: ServiceAccount
metadata:
  name: wiz-todo-sa
  namespace: wiz-lab
---
# Intentional weakness required by the exercise: application gets cluster-wide admin privilege.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wiz-todo-sa-cluster-admin
subjects:
  - kind: ServiceAccount
    name: wiz-todo-sa
    namespace: wiz-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin

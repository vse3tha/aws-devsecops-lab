apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiz-todo
  namespace: wiz-lab
  labels:
    app: wiz-todo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wiz-todo
  template:
    metadata:
      labels:
        app: wiz-todo
    spec:
      serviceAccountName: wiz-todo-sa
      containers:
        - name: wiz-todo
          image: ${IMAGE_URI}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: MONGO_DB
              value: "appdb"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-uri
                  key: MONGO_URI
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: wiz-todo
  namespace: wiz-lab
spec:
  type: ClusterIP
  selector:
    app: wiz-todo
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wiz-todo
  namespace: wiz-lab
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wiz-todo
                port:
                  number: 80
